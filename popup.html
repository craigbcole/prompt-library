<!DOCTYPE html>
<html>
<head>
  <title>Prompt Library for Imagine</title>
  <style>
    body { width: 420px; padding: 20px; background: #0a0a0a; color: #e5e5e5; font-family: system-ui; }
    h1 { font-size: 18px; margin-bottom: 16px; text-align: center; }
    #search { width: 100%; padding: 10px; margin-bottom: 16px; border-radius: 8px; border: 1px solid #444; background: #111; color: #e5e5e5; font-size: 14px; }
    #library { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
    .item { background: #1a1a1a; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; }
    .item img { width: 100%; height: 120px; object-fit: cover; }
    .prompt { padding: 8px; font-size: 12px; line-height: 1.3; max-height: 60px; overflow: hidden; }
    .empty { text-align: center; padding: 40px 20px; color: #888; }
    /* Modal */
    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
    #modal-content { background: #1a1a1a; border-radius: 12px; width: 320px; max-height: 68vh; overflow-y: auto; padding: 14px; text-align: center; box-sizing: border-box; }
    #modal img { max-width: 100%; max-height: 250px; border-radius: 8px; margin-bottom: 10px; object-fit: contain; }
    #modal-prompt { font-size: 13px; line-height: 1.4; margin-bottom: 16px; text-align: left; background: #111; padding: 10px; border-radius: 6px; max-height: 140px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    .modal-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    #modal-close, #modal-regenerate, #modal-share { 
      background: #333; color: white; border: none; padding: 9px 14px; 
      border-radius: 6px; cursor: pointer; flex: 1; min-width: 100px; font-size: 13px; 
    }
    #modal-regenerate { background: #1a73e8; }
    #modal-share { background: #34a853; }
  </style>
</head>
<body>
  <h1>Prompt Library for Imagine</h1>
  <input type="text" id="search" placeholder="Search prompts...">
  <div id="library">Loading your history...</div>

  <!-- Modal -->
  <div id="modal">
    <div id="modal-content">
      <img id="modal-image" src="">
      <div id="modal-prompt"></div>
      <div class="modal-buttons">
        <button id="modal-regenerate">Regenerate</button>
        <button id="modal-share">Share Prompt</button>
        <button id="modal-close">Close</button>
      </div>
    </div>
  </div>

  <!-- Bottom buttons -->
  <div style="display:flex; gap:10px; margin-top:16px;">
    <button id="clearLibrary" style="flex:1; background:#c33; padding:10px; border:none; border-radius:8px; color:white; font-weight:500; cursor:pointer;">
      Clear Library
    </button>
    <button id="exportLibrary" style="flex:1; background:#1a73e8; padding:10px; border:none; border-radius:8px; color:white; font-weight:500; cursor:pointer;">
      Export Library
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
